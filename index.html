<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMatrix Enterprise | Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #050505; --card: rgba(15, 20, 30, 0.8); --border: rgba(0, 243, 255, 0.2);
            --cyan: #00F3FF; --emerald: #00FF9D; --magenta: #FF0055; --gold: #FFD700;
            --red: #e74c3c; --orange: #e67e22; --purple: #9b59b6;
            --text: #E0E6ED; --muted: #6B7280;
            --glow-c: 0 0 10px rgba(0, 243, 255, 0.5); --glow-e: 0 0 10px rgba(0, 255, 157, 0.5);
            --glow-m: 0 0 10px rgba(255, 0, 85, 0.5); --glow-g: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(5,5,5,0.95); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; backdrop-filter: blur(10px); }
        .sidebar { width: 240px; height: 100vh; position: fixed; left: 0; top: 60px; background: rgba(10,10,15,0.95); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .main { margin-left: 240px; margin-top: 60px; padding: 30px; flex: 1; width: calc(100% - 240px); }
        
        .notif-banner { position: fixed; top: 70px; left: 260px; right: 20px; background: linear-gradient(135deg, var(--orange), var(--red)); color: #fff; padding: 15px 20px; border-radius: 10px; display: none; align-items: center; gap: 15px; z-index: 99; box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4); animation: slideDown 0.5s ease; }
        .notif-banner.show { display: flex; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .notif-banner .btn-sm { padding: 6px 14px; background: #fff; color: var(--red); border: none; border-radius: 5px; font-weight: 700; cursor: pointer; }
        
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .glass:hover { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,243,255,0.1); }
        .grid { display: grid; gap: 20px; }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
        
        h2 { font-family: 'Orbitron', sans-serif; color: var(--cyan); margin-bottom: 20px; letter-spacing: 1px; font-size: 1.5rem; text-shadow: var(--glow-c); }
        h3 { font-family: 'Orbitron', sans-serif; color: #fff; margin-bottom: 15px; font-size: 1.1rem; }
        .stat { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 700; margin: 10px 0; }
        .stat-huge { font-size: 3rem; text-align: center; margin: 20px 0; }
        .cyan { color: var(--cyan); text-shadow: var(--glow-c); }
        .emerald { color: var(--emerald); text-shadow: var(--glow-e); }
        .magenta { color: var(--magenta); text-shadow: var(--glow-m); }
        .gold { color: var(--gold); text-shadow: var(--glow-g); }
        .red { color: var(--red); }
        .orange { color: var(--orange); }
        .purple { color: var(--purple); }
        .muted { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .logo { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo i { font-size: 2rem; color: var(--cyan); text-shadow: var(--glow-c); }
        .nav-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; color: var(--muted); display: flex; align-items: center; gap: 12px; transition: 0.2s; font-weight: 600; }
        .nav-item:hover { background: rgba(0,243,255,0.1); color: var(--cyan); }
        .nav-item.active { background: rgba(0,243,255,0.2); color: var(--cyan); box-shadow: inset 3px 0 0 var(--cyan); }
        
        .form-control { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-family: 'Rajdhani'; font-size: 1rem; }
        .form-control:focus { border-color: var(--cyan); outline: none; box-shadow: 0 0 8px rgba(0,243,255,0.3); }
        textarea.form-control { min-height: 80px; resize: vertical; }
        .btn { padding: 12px 20px; border: 1px solid var(--cyan); background: transparent; color: var(--cyan); font-family: 'Orbitron'; cursor: pointer; border-radius: 6px; font-weight: 700; letter-spacing: 1px; transition: 0.2s; width: 100%; text-transform: uppercase; font-size: 0.85rem; }
        .btn:hover { background: var(--cyan); color: #000; box-shadow: var(--glow-c); }
        .btn-emerald { border-color: var(--emerald); color: var(--emerald); }
        .btn-emerald:hover { background: var(--emerald); color: #000; box-shadow: var(--glow-e); }
        .btn-magenta { border-color: var(--magenta); color: var(--magenta); }
        .btn-magenta:hover { background: var(--magenta); color: #fff; box-shadow: var(--glow-m); }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-red:hover { background: var(--red); color: #fff; box-shadow: 0 0 10px var(--red); }
        .btn-orange { border-color: var(--orange); color: var(--orange); }
        .btn-orange:hover { background: var(--orange); color: #fff; box-shadow: 0 0 10px var(--orange); }
        .btn-purple { border-color: var(--purple); color: var(--purple); }
        .btn-purple:hover { background: var(--purple); color: #fff; box-shadow: 0 0 10px var(--purple); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-sm { padding: 8px 16px; font-size: 0.75rem; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-family: 'Orbitron'; border: 1px solid; display: inline-flex; align-items: center; gap: 6px; }
        .badge-m { border-color: var(--magenta); color: var(--magenta); background: rgba(255,0,85,0.1); }
        .badge-e { border-color: var(--emerald); color: var(--emerald); background: rgba(0,255,157,0.1); }
        .badge-g { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); }
        
        .level-master { background: linear-gradient(135deg, rgba(0,243,255,0.05), rgba(0,255,157,0.05)); border: 1px solid var(--cyan); position: relative; overflow: hidden; }
        .progress-bar { height: 24px; background: #000; border-radius: 12px; border: 1px solid var(--cyan); overflow: hidden; position: relative; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--emerald)); transition: width 1s ease; box-shadow: 0 0 15px var(--cyan); }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 0.9rem; color: #fff; text-shadow: 0 0 5px #000; z-index: 2; }
        
        .chart-container { position: relative; height: 400px; margin-top: 20px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .chart-stat { text-align: center; padding: 10px 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid var(--border); }
        .chart-stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .chart-stat-value { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 700; margin-top: 5px; }
        
        /* REAL CALENDAR STYLES */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .month-card { padding: 20px; }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .day-label { text-align: center; font-family: 'Orbitron'; font-size: 0.65rem; font-weight: 900; letter-spacing: 0.5px; padding: 4px 0; }
        .day-label.weekday { color: var(--cyan); text-shadow: var(--glow-c); }
        .day-label.weekend { color: var(--magenta); text-shadow: var(--glow-m); }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day { 
            aspect-ratio: 1; background: #111; border-radius: 6px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 0.85rem; font-weight: 600; cursor: pointer; 
            border: 1px solid #222; transition: 0.2s; padding: 2px; position: relative;
        }
        .day.empty { background: transparent; border: none; cursor: default; pointer-events: none; }
        .day:not(.empty):hover { border-color: var(--cyan); transform: scale(1.08); z-index: 5; box-shadow: 0 0 10px var(--cyan); }
        .day-num { font-family: 'Orbitron'; font-size: 0.85rem; }
        .day-amt { font-size: 0.6rem; font-family: 'Orbitron'; margin-top: 1px; font-weight: 700; line-height: 1; }
        .day.win { background: var(--emerald); color: #000; border-color: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
        .day.loss { background: var(--magenta); color: #fff; border-color: var(--magenta); box-shadow: 0 0 8px var(--magenta); }
        .day.today { border: 2px solid var(--gold); box-shadow: 0 0 12px var(--gold); }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--cyan); border-bottom: 1px solid var(--border); font-family: 'Orbitron'; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        
        .strike-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .strike-btn { flex: 1; min-width: 45px; padding: 10px 4px; font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid #444; background: transparent; color: #666; border-radius: 4px; cursor: pointer; }
        .strike-btn.active { background: var(--magenta); border-color: var(--magenta); color: #fff; }
        .abs-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }
        
        .pagination-row { display: flex; gap: 10px; margin-top: 15px; align-items: center; }
        .page-btn { flex: 1; padding: 8px; background: rgba(0,243,255,0.1); border: 1px solid var(--cyan); color: var(--cyan); border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-indicator { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--gold); text-align: center; flex: 1; }
        
        .wallet-display { text-align: center; padding: 60px 20px; }
        .wallet-icon { font-size: 5rem; color: var(--gold); text-shadow: var(--glow-g); margin-bottom: 30px; }
        .wallet-amount { font-size: 4rem; font-family: 'Orbitron'; font-weight: 900; color: var(--gold); margin: 20px 0; }
        .wallet-label { font-family: 'Orbitron'; color: var(--muted); font-size: 1rem; letter-spacing: 2px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #111; border: 1px solid var(--cyan); padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; }

        .news-tag { display: inline-block; padding: 4px 10px; background: rgba(231,76,60,0.2); color: var(--red); border: 1px solid var(--red); border-radius: 4px; font-size: 0.75rem; font-family: 'Orbitron'; margin: 2px; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; } .sidebar span { display: none; } 
            .main { margin-left: 70px; width: calc(100% - 70px); padding: 15px; }
            .notif-banner { left: 80px; }
            .calendar-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div style="display:flex; gap:15px; align-items:center;">
            <span class="badge badge-m" id="mode-badge"><i class="fas fa-eye"></i> VIEWER MODE</span>
            <span class="badge badge-g" id="db-badge"><i class="fas fa-database"></i> SYNCING</span>
        </div>
        <button class="btn btn-sm" style="width:auto; padding:8px 16px;" onclick="openAdminModal()">
            <i class="fas fa-lock-open"></i> UNLOCK ADMIN
        </button>
    </header>

    <div class="notif-banner" id="notif-banner">
        <i class="fas fa-bell" style="font-size:1.5rem;"></i>
        <div style="flex:1;">
            <strong id="notif-title">Report Ready</strong>
            <div style="font-size:0.85rem; opacity:0.9;" id="notif-msg">Send to Discord?</div>
        </div>
        <button class="btn-sm" onclick="triggerSmartSend()">SEND NOW</button>
        <button class="btn-sm" style="background:rgba(0,0,0,0.3); color:#fff;" onclick="dismissNotif()">✕</button>
    </div>

    <aside class="sidebar">
        <div class="logo"><i class="fas fa-cube"></i><h3 style="margin-top:10px;">ALPHA<span class="cyan">MATRIX</span></h3></div>
        <div id="nav-list"></div>
    </aside>

    <main class="main" id="app-container"></main>

    <div class="modal" id="admin-modal">
        <div class="modal-box">
            <h3 class="cyan"><i class="fas fa-shield-alt"></i> ADMIN ACCESS</h3>
            <p class="muted" style="margin:15px 0;">ENTER MASTER KEY</p>
            <input type="password" id="admin-pass" class="form-control" placeholder="MASTER KEY" onkeypress="if(event.key==='Enter') verifyAdmin()">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-emerald" onclick="verifyAdmin()">UNLOCK</button>
                <button class="btn btn-magenta" onclick="closeModal('admin-modal')">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="modal" id="day-modal">
        <div class="modal-box">
            <h3 class="cyan" id="day-title">LOG DAY</h3>
            <div style="display:flex; gap:10px; margin:20px 0;">
                <button class="btn btn-emerald" onclick="setOutcome('win')">🟢 WIN</button>
                <button class="btn btn-magenta" onclick="setOutcome('loss')">🔴 LOSS</button>
            </div>
            <input type="number" id="day-amt" class="form-control" placeholder="AMOUNT ($)">
            <textarea id="day-news" class="form-control" placeholder="📰 High Impact News Context (Optional)"></textarea>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-emerald" onclick="saveDay()">SAVE</button>
                <button class="btn btn-magenta" onclick="clearDay()">CLEAR</button>
                <button class="btn" onclick="closeModal('day-modal')">CANCEL</button>
            </div>
        </div>
    </div>

<script>
    const ADMIN_KEY = "ALPHA2026";
    let isAdmin = localStorage.getItem('alpha_admin') === 'true';
    let db;
    let equityChart = null;
    
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1524794862736773140/HbblArOLZVn5fnPYy97oV08Sl9ksaFXg06VtFUcoI4OaRbbvoQP4-fcQRoOlF3kNY_Y-";
    const BOT_AVATAR = "https://alpha-matrix-chi.vercel.app/favicon.ico";

    // 🗓️ REAL CALENDAR CONFIG FOR 2026
    const CALENDAR_YEAR = 2026;
    const MONTH_NAMES = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
    const DAY_LABELS = [
        { name: 'MON', type: 'weekday' }, { name: 'TUE', type: 'weekday' }, { name: 'WED', type: 'weekday' },
        { name: 'THU', type: 'weekday' }, { name: 'FRI', type: 'weekday' }, { name: 'SAT', type: 'weekend' }, { name: 'SUN', type: 'weekend' }
    ];

    let state = {
        activeBalance: 150.00, 
        binanceWallet: 0.00,
        targets: [
            { id: 1, goal: 320, withdraw: 150, newBalance: 170, completed: false },
            { id: 2, goal: 400, withdraw: 200, newBalance: 200, completed: false },
            { id: 3, goal: 500, withdraw: 250, newBalance: 250, completed: false },
            { id: 4, goal: 750, withdraw: 375, newBalance: 375, completed: false },
            { id: 5, goal: 1000, withdraw: 500, newBalance: 500, completed: false },
            { id: 6, goal: 1500, withdraw: 750, newBalance: 750, completed: false },
            { id: 7, goal: 2000, withdraw: 1000, newBalance: 1000, completed: false },
            { id: 8, goal: 3000, withdraw: 1500, newBalance: 1500, completed: false },
            { id: 9, goal: 4000, withdraw: 2000, newBalance: 2000, completed: false },
            { id: 10, goal: 5000, withdraw: 2500, newBalance: 2500, completed: false }
        ],
        trades: [], 
        leaks: [], 
        calendar: {},
        strikes: { NOAMANE: 0, HOSSAM: 0, YASSINE: 0, MONCEF: 0, TAHA: 0, AMINE: 0 },
        absences: { NOAMANE: 0, HOSSAM: 0, YASSINE: 0, MONCEF: 0, TAHA: 0, AMINE: 0 },
        lastDailySent: null,
        lastWeeklySent: null
    };
    const team = ['NOAMANE', 'HOSSAM', 'YASSINE', 'MONCEF', 'TAHA', 'AMINE'];
    
    let ui = { 
        view: 'dashboard', 
        dayKey: null, 
        outcome: null,
        smartSendType: null,
        pages: { strikes: {}, absences: {} }
    };

    const firebaseConfig = {
        apiKey: "AIzaSyBPFG8TJEMrtgRPpKJekUgaB4Qy47N2-64",
        authDomain: "alpha-matrix-57042.firebaseapp.com",
        databaseURL: "https://alpha-matrix-57042-default-rtdb.firebaseio.com",
        projectId: "alpha-matrix-57042"
    };
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        db.ref('alphaMatrix_v16').on('value', snap => {
            if(snap.val()) {
                state = { ...state, ...snap.val() };
                if(!state.trades) state.trades = [];
                if(!state.lastDailySent) state.lastDailySent = null;
                if(!state.lastWeeklySent) state.lastWeeklySent = null;
                renderAll();
                document.getElementById('db-badge').innerHTML = '<i class="fas fa-check"></i> SYNCED';
                document.getElementById('db-badge').className = 'badge badge-e';
                checkSmartNotifications();
            }
        });
    } catch(e) { console.log("Offline Mode"); }

    function save() {
        if(db) db.ref('alphaMatrix_v16').set(state);
        else localStorage.setItem('alphaMatrix_local', JSON.stringify(state));
    }

    // --- REAL CALENDAR HELPER FUNCTIONS ---
    function getDaysInMonth(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }

    function getFirstDayOfMonth(year, month) {
        // Returns 0=Sun, 1=Mon, ..., 6=Sat
        // We need 0=Mon, 1=Tue, ..., 6=Sun for our grid
        const day = new Date(year, month, 1).getDay();
        return day === 0 ? 6 : day - 1; // Convert Sun=0 to Mon-based (Mon=0, Sun=6)
    }

    function formatDateKey(year, month, day) {
        const m = String(month + 1).padStart(2, '0');
        const d = String(day).padStart(2, '0');
        return `${year}-${m}-${d}`;
    }

    function getDayName(year, month, day) {
        const date = new Date(year, month, day);
        return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    function isToday(year, month, day) {
        const today = new Date();
        return today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
    }

    async function sendDiscordWebhook(payload) {
        try {
            const response = await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) console.error('Discord Error:', response.status);
            else console.log('✅ Sent to Discord');
            return response.ok;
        } catch (error) {
            console.error('Network Error:', error);
            return false;
        }
    }

    function checkSmartNotifications() {
        if (!isAdmin) return;
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const isSunday = now.getDay() === 0;
        const hour = now.getUTCHours();
        
        const todayTrades = state.trades.filter(t => t.date && t.date.split('T')[0] === today);
        
        if (todayTrades.length > 0 && state.lastDailySent !== today) {
            ui.smartSendType = 'daily';
            showNotif('📊 Daily Recap Ready', `You logged ${todayTrades.length} trade(s) today. Send recap to Discord?`);
            return;
        }
        
        if (isSunday && hour >= 20 && state.lastWeeklySent !== today) {
            ui.smartSendType = 'weekly';
            showNotif('🏆 Weekly Report Ready', "It's Sunday night. Send weekly performance report?");
            return;
        }
    }

    function showNotif(title, msg) {
        document.getElementById('notif-title').textContent = title;
        document.getElementById('notif-msg').textContent = msg;
        document.getElementById('notif-banner').classList.add('show');
    }

    function dismissNotif() {
        document.getElementById('notif-banner').classList.remove('show');
    }

    function triggerSmartSend() {
        dismissNotif();
        if (ui.smartSendType === 'daily') pushDailyRecap();
        else if (ui.smartSendType === 'weekly') pushWeeklyReport();
    }

    function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function verifyAdmin() {
        if(document.getElementById('admin-pass').value === ADMIN_KEY) {
            isAdmin = true;
            localStorage.setItem('alpha_admin', 'true');
            document.getElementById('mode-badge').innerHTML = '<i class="fas fa-user-shield"></i> ADMIN MODE';
            document.getElementById('mode-badge').className = 'badge badge-e';
            closeModal('admin-modal');
            renderAll();
            checkSmartNotifications();
        } else {
            alert("❌ ACCESS DENIED");
        }
    }

    function renderCalendar() {

        return `

            <div class="calendar-grid">
                ${MONTH_NAMES.map((monthName, monthIdx) => {
                    const daysInMonth = getDaysInMonth(CALENDAR_YEAR, monthIdx);
                    const firstDayOffset = getFirstDayOfMonth(CALENDAR_YEAR, monthIdx); // 0=Mon, 6=Sun
                    
                    // Build empty padding cells for days before the 1st
                    let daysHtml = '';
                    for (let pad = 0; pad < firstDayOffset; pad++) {
                        daysHtml += `<div class="day empty"></div>`;
                    }
                    
                    // Build actual day cells
                    for (let d = 1; d <= daysInMonth; d++) {
                        const key = formatDateKey(CALENDAR_YEAR, monthIdx, d);
                        const log = state.calendar[key];
                        const isTodayCell = (key === todayKey);
                        
                        let cls = 'day';
                        if (isTodayCell) cls += ' today';
                        
                        let content = `<div class="day-num">${d}</div>`;
                        
                        if(log) {
                            cls += log.outcome === 'win' ? ' win' : ' loss';
                            const amt = Math.abs(log.amount);
                            const display = amt >= 1000 ? (amt/1000).toFixed(1)+'k' : amt;
                            content += `<div class="day-amt">${log.outcome === 'win' ? '+' : '-'}$${display}</div>`;
                        }
                        
                        const dayFullName = getDayName(CALENDAR_YEAR, monthIdx, d);
                        const clickAttr = isAdmin ? `onclick="openDay('${key}', ${d}, '${dayFullName}')"` : '';
                        const titleAttr = `title="${dayFullName}"`;
                        
                        daysHtml += `<div class="${cls}" ${clickAttr} ${titleAttr}>${content}</div>`;
                    }
                    
                    return `
                        <div class="glass month-card">
                            <h3 style="text-align:center; margin-bottom:15px;">${monthName}</h3>
                            <div class="days-header">
                                ${DAY_LABELS.map(dl => `<div class="day-label ${dl.type}">${dl.name}</div>`).join('')}

                }).join('')}

        `;
    }

    function renderEquityCurve() {
        const canvas = document.getElementById('equityChart');
        if (!canvas) return;
        const { labels, cumulative, dailyData } = buildEquityData();
        const dailyValues = Object.values(dailyData);
        const bestDay = dailyValues.length > 0 ? Math.max(...dailyValues) : 0;
        const worstDay = dailyValues.length > 0 ? Math.min(...dailyValues) : 0;
        const avgDay = dailyValues.length > 0 ? (dailyValues.reduce((a,b) => a+b, 0) / dailyValues.length) : 0;
        const curPnl = cumulative.length > 0 ? cumulative[cumulative.length-1] - 150 : 0;
        
        document.getElementById('best-day').textContent = `${bestDay >= 0 ? '+' : ''}$${bestDay.toFixed(2)}`;
        document.getElementById('worst-day').textContent = `${worstDay >= 0 ? '+' : ''}$${worstDay.toFixed(2)}`;
        document.getElementById('avg-day').textContent = `${avgDay >= 0 ? '+' : ''}$${avgDay.toFixed(2)}`;
        
        if (labels.length === 0) return;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        if (curPnl >= 0) { gradient.addColorStop(0, 'rgba(0, 255, 157, 0.4)'); gradient.addColorStop(1, 'rgba(0, 255, 157, 0.0)'); } 
        else { gradient.addColorStop(0, 'rgba(255, 0, 85, 0.4)'); gradient.addColorStop(1, 'rgba(255, 0, 85, 0.0)'); }
        
        equityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Equity ($)', data: cumulative,
                    borderColor: curPnl >= 0 ? '#00FF9D' : '#FF0055',
                    backgroundColor: gradient, borderWidth: 3, fill: true, tension: 0.3,
                    pointRadius: 5, pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(0,243,255,0.1)' }, ticks: { color: '#6B7280', callback: (v) => '$' + v.toFixed(0) } },
                    x: { grid: { display: false }, ticks: { color: '#6B7280' } }
                }
            }
        });
    }

    function buildEquityData() {
        const dailyData = {};
        // Aggregate calendar logs (keys are now YYYY-MM-DD)
        Object.keys(state.calendar).forEach(key => {
            const log = state.calendar[key];
            if (log && log.amount !== undefined) {
                if (!dailyData[key]) dailyData[key] = 0;
                dailyData[key] += parseFloat(log.amount);
            }
        });
        // Aggregate trades by date
        state.trades.forEach(t => {
            if(!t.date) return;
            const key = t.date.split('T')[0];
            if (!dailyData[key]) dailyData[key] = 0;
            dailyData[key] += parseFloat(t.pnl);
        });
        const sortedKeys = Object.keys(dailyData).sort();
        const labels = sortedKeys.map(k => {
            const d = new Date(k + 'T00:00:00');
            return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
        });
        const cumulative = [];
        let running = 150;
        sortedKeys.forEach(key => {
            running += dailyData[key];
            cumulative.push(running);
        });
        return { labels, cumulative, dailyData, sortedKeys };
    }

    // --- ACTIONS WITH DISCORD HOOKS ---
    window.switchView = switchView;
    
    window.withdraw = async (i) => {
        if(!isAdmin) return;
        const t = state.targets[i];
        const nextTarget = state.targets[i + 1];
        
        state.activeBalance = t.newBalance;
        state.binanceWallet += t.withdraw;
        t.completed = true;
        save(); renderAll();
        
        await sendDiscordWebhook({
            username: "Alpha Matrix Bot",
            avatar_url: BOT_AVATAR,
            embeds: [{
                title: "🎉 CONGRATULATIONS! LEVEL UP!",
                description: `You've successfully completed **Level ${t.id}** and secured your profits.`,
                color: 10181046,
                fields: [
                    { name: "🏆 Level Completed", value: `Level ${t.id}`, inline: true },
                    { name: "🎯 Next Target", value: nextTarget ? `Level ${nextTarget.id} - $${nextTarget.goal}` : "**MASTER LEVEL** 👑", inline: true },
                    { name: "💰 Secured to Wallet", value: `**+$${t.withdraw.toFixed(2)}**`, inline: false },
                    { name: "💵 New Active Balance", value: `$${state.activeBalance.toFixed(2)}`, inline: true },
                    { name: "🏦 Total in Wallet", value: `$${state.binanceWallet.toFixed(2)}`, inline: true }
                ],
                footer: { text: "Alpha Matrix • Keep pushing!" },
                timestamp: new Date().toISOString()
            }]
        });
    };

    window.addTrade = async () => {
        if(!isAdmin) return;
        const sym = document.getElementById('log-sym').value;
        const out = document.getElementById('log-out').value;
        const pnl = parseFloat(document.getElementById('log-pnl').value);
        const news = document.getElementById('log-news').value.trim();
        if(!pnl) return alert("Enter valid amount");
        
        state.trades.unshift({ symbol: sym, outcome: out, pnl, date: new Date().toISOString(), news: news || null });
        state.activeBalance += pnl;
        save(); renderAll();
        
        await sendDiscordWebhook({
            username: "Alpha Matrix Bot",
            avatar_url: BOT_AVATAR,
            embeds: [{
                title: "🎯 TRADE LOGGED",
                color: 3066993,
                fields: [
                    { name: "💵 Asset", value: sym, inline: true },
                    { name: "📉 Outcome", value: out.toUpperCase(), inline: true },
                    { name: "💰 P&L", value: `**${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}**`, inline: false },
                    ...(news ? [{ name: "📰 News Context", value: news, inline: false }] : [])
                ],
                footer: { text: "Alpha Matrix Automation" },
                timestamp: new Date().toISOString()
            }]
        });
    };

    window.toggleTrack = async (type, name, lvl) => {
        if(!isAdmin) return;
        const cur = state[type][name] || 0;
        const newCount = (cur === lvl) ? lvl - 1 : lvl;
        state[type][name] = newCount;
        
        const targetPage = Math.max(0, Math.ceil(newCount / 5) - 1);
        ui.pages[type][name] = targetPage;
        save(); renderAll();
        
        const isAdded = newCount > cur;
        const isStrike = type === 'strikes';
        const topicLabel = isStrike ? "⚠️ STRIKES" : "🕐 ABSENCES";
        const topicDescription = isStrike ? "Rule infraction logged for team member" : "Absence logged for team member";
        const embedColor = isStrike ? 15158332 : 1752220;
        const emoji = isStrike ? "🔴" : "🟡";
        
        let warningField = [];
        if (newCount >= 3) {
            warningField = [{ 
                name: "🚨 WARNING STATUS", 
                value: `**${name}** has reached **${newCount}** ${type}! Immediate attention required.`, 
                inline: false 
            }];
        }
        
        await sendDiscordWebhook({
            username: "Alpha Matrix HR Bot",
            avatar_url: BOT_AVATAR,
            embeds: [{
                title: `${emoji} TEAM MEMBER UPDATE LOGGED`,
                description: topicDescription,
                color: embedColor,
                fields: [
                    { name: "👤 Name", value: `**${name}**`, inline: true },
                    { name: "📋 Topic", value: topicLabel, inline: true },
                    { name: "🔢 Number", value: `**${newCount}**`, inline: true },
                    { name: "📊 Action", value: isAdded ? `Added ${isStrike ? 'Strike' : 'Absence'} #${newCount}` : `Removed - Now at ${newCount}`, inline: false },
                    ...warningField
                ],
                footer: { text: "Alpha Matrix • HR Tracking System" },
                timestamp: new Date().toISOString()
            }]
        });
    };

    window.changePage = (type, name, newPage) => {
        if(!isAdmin) return;
        if(!ui.pages[type]) ui.pages[type] = {};
        ui.pages[type][name] = newPage;
        renderAll();
    };

    // UPDATED: openDay now receives full day name for display
    window.openDay = (k, d, dayFullName) => {
        if(!isAdmin) return;
        ui.dayKey = k;
        document.getElementById('day-title').innerText = dayFullName || `LOG DAY ${d}`;
        const log = state.calendar[k];
        document.getElementById('day-amt').value = log ? log.amount : '';
        document.getElementById('day-news').value = log && log.news ? log.news : '';
        ui.outcome = log ? log.outcome : null;
        document.getElementById('day-modal').style.display = 'flex';
    };
    window.setOutcome = (o) => { ui.outcome = o; };
    window.saveDay = () => {
        if(!ui.outcome) return alert("Select Outcome");
        const amt = parseFloat(document.getElementById('day-amt').value);
        const news = document.getElementById('day-news').value.trim();
        if(!amt) return alert("Enter Amount");
        state.calendar[ui.dayKey] = { outcome: ui.outcome, amount: amt, news: news || null };
        closeModal('day-modal'); save(); renderAll();
    };
    window.clearDay = () => { delete state.calendar[ui.dayKey]; closeModal('day-modal'); save(); renderAll(); };
    window.addLeak = () => {
        const r = document.getElementById('lk-r').value;
        const a = parseFloat(document.getElementById('lk-a').value);
        if(!r || !a) return alert("Fill both fields");
        state.leaks.unshift({ reason: r, amt: a });
        save(); renderAll();
    };

    window.pushDailyRecap = async () => {
        if(!isAdmin) return;
        const today = new Date().toISOString().split('T')[0];
        const todayTrades = state.trades.filter(t => t.date && t.date.split('T')[0] === today);
        
        // Use real date key for calendar lookup
        const calendarLog = state.calendar[today];
        
        let totalTrades = todayTrades.length;
        let wins = todayTrades.filter(t => t.outcome === 'win').length;
        let pnl = todayTrades.reduce((sum, t) => sum + t.pnl, 0);
        
        if (calendarLog) {
            totalTrades += 1;
            if (calendarLog.outcome === 'win') wins += 1;
            pnl += calendarLog.amount;
        }
        
        const winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
        const newsItems = todayTrades.filter(t => t.news).map(t => `• **${t.symbol}**: ${t.news}`);
        const manualNotes = document.getElementById('daily-notes')?.value.trim() || '';
        if (calendarLog && calendarLog.news) newsItems.push(`• **Calendar Log**: ${calendarLog.news}`);
        
        await sendDiscordWebhook({
            username: "Alpha Matrix System",
            avatar_url: BOT_AVATAR,
            embeds: [{
                title: "📊 DAILY RECAP | END OF DAY",
                description: `Trading session completed for **${new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}**`,
                color: 15158332,
                fields: [
                    { name: "📈 Total Trades", value: `${totalTrades}`, inline: true },
                    { name: "🎯 Win Rate", value: `${winRate}%`, inline: true },
                    { name: "💰 Net P&L", value: `**${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}**`, inline: false },
                    { name: "💵 Active Balance", value: `$${state.activeBalance.toFixed(2)}`, inline: true },
                    { name: "🏦 Wallet", value: `$${state.binanceWallet.toFixed(2)}`, inline: true },
                    ...(newsItems.length > 0 ? [{ name: "📰 High Impact News Today", value: newsItems.join('\n'), inline: false }] : []),
                    ...(manualNotes ? [{ name: "📝 Additional Notes", value: manualNotes, inline: false }] : [])
                ],
                footer: { text: "Alpha Matrix • Daily Recap" },
                timestamp: new Date().toISOString()
            }]
        });
        
        state.lastDailySent = today;
        save();
        renderAll();
        alert("✅ Daily Recap sent!");
    };

    window.pushWeeklyReport = async () => {
        if(!isAdmin) return;
        const now = new Date();
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        const weekAgoStr = weekAgo.toISOString().split('T')[0];
        
        const weekTrades = state.trades.filter(t => t.date && t.date >= weekAgoStr);
        let totalTrades = weekTrades.length;
        let wins = weekTrades.filter(t => t.outcome === 'win').length;
        let losses = weekTrades.filter(t => t.outcome === 'loss').length;
        let pnl = weekTrades.reduce((sum, t) => sum + t.pnl, 0);
        let grossProfit = weekTrades.filter(t => t.pnl > 0).reduce((sum, t) => sum + t.pnl, 0);
        let grossLoss = weekTrades.filter(t => t.pnl < 0).reduce((sum, t) => sum + Math.abs(t.pnl), 0);
        
        const bestTrade = weekTrades.length > 0 ? Math.max(...weekTrades.map(t => t.pnl)) : 0;
        const worstTrade = weekTrades.length > 0 ? Math.min(...weekTrades.map(t => t.pnl)) : 0;
        const winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
        const profitFactor = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : "∞";
        
        const weekStart = weekAgo.toLocaleDateString('en-US', {month:'short', day:'numeric'});
        const weekEnd = now.toLocaleDateString('en-US', {month:'short', day:'numeric'});
        const manualNotes = document.getElementById('weekly-notes')?.value.trim() || '';
        
        await sendDiscordWebhook({
            username: "Alpha Matrix System",
            avatar_url: BOT_AVATAR,
            embeds: [{
                title: "🏆 WEEKLY PERFORMANCE REPORT",
                description: `Complete breakdown for week **${weekStart} - ${weekEnd}**`,
                color: 15105570,
                fields: [
                    { name: "📊 Total Trades", value: `${totalTrades}`, inline: true },
                    { name: "🎯 Win Rate", value: `${winRate}% (${wins}W / ${losses}L)`, inline: true },
                    { name: "💰 Net Result", value: `**${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}**`, inline: false },
                    { name: "📈 Gross Profit", value: `$${grossProfit.toFixed(2)}`, inline: true },
                    { name: "📉 Gross Loss", value: `-$${grossLoss.toFixed(2)}`, inline: true },
                    { name: "⚖️ Profit Factor", value: `${profitFactor}`, inline: true },
                    { name: "🏅 Best Trade", value: `+$${bestTrade.toFixed(2)}`, inline: true },
                    { name: "⚠️ Worst Trade", value: `$${worstTrade.toFixed(2)}`, inline: true },
                    { name: "💵 Current Balance", value: `$${state.activeBalance.toFixed(2)}`, inline: true },
                    { name: "🏦 Total Wallet", value: `$${state.binanceWallet.toFixed(2)}`, inline: true },
                    ...(manualNotes ? [{ name: "🔮 Next Week Outlook", value: manualNotes, inline: false }] : [])
                ],
                footer: { text: "Alpha Matrix • Weekly Wrap-Up" },
                timestamp: new Date().toISOString()
            }]
        });
        
        state.lastWeeklySent = new Date().toISOString().split('T')[0];
        save();
        renderAll();
        alert("✅ Weekly Report sent!");
    };

    window.clearAllData = () => {
        if(!isAdmin) return;
        if(!confirm("⚠️ DELETE ALL DATA?")) return;
        state = {
            activeBalance: 150.00, binanceWallet: 0.00,
            targets: [
                { id: 1, goal: 320, withdraw: 150, newBalance: 170, completed: false },
                { id: 2, goal: 400, withdraw: 200, newBalance: 200, completed: false },
                { id: 3, goal: 500, withdraw: 250, newBalance: 250, completed: false },
                { id: 4, goal: 750, withdraw: 375, newBalance: 375, completed: false },
                { id: 5, goal: 1000, withdraw: 500, newBalance: 500, completed: false },
                { id: 6, goal: 1500, withdraw: 750, newBalance: 750, completed: false },
                { id: 7, goal: 2000, withdraw: 1000, newBalance: 1000, completed: false },
                { id: 8, goal: 3000, withdraw: 1500, newBalance: 1500, completed: false },
                { id: 9, goal: 4000, withdraw: 2000, newBalance: 2000, completed: false },
                { id: 10, goal: 5000, withdraw: 2500, newBalance: 2500, completed: false }
            ],
            trades: [], leaks: [], calendar: {},
            strikes: { NOAMANE: 0, HOSSAM: 0, YASSINE: 0, MONCEF: 0, TAHA: 0, AMINE: 0 },
            absences: { NOAMANE: 0, HOSSAM: 0, YASSINE: 0, MONCEF: 0, TAHA: 0, AMINE: 0 },
            lastDailySent: null, lastWeeklySent: null
        };
        ui.pages = { strikes: {}, absences: {} };
        save(); renderAll();
        alert("✅ Reset complete!");
    };

    function updateStats() {
        let pnl = 0, wins = 0;
        state.trades.forEach(t => { pnl += t.pnl; if(t.outcome === 'win') wins++; });
        Object.values(state.calendar).forEach(l => pnl += l.amount);
        const wr = state.trades.length > 0 ? ((wins/state.trades.length)*100).toFixed(1) : 0;
        const pnlEl = document.getElementById('dash-pnl');
        const wrEl = document.getElementById('dash-wr');
        if(pnlEl) { pnlEl.innerText = `$${pnl.toFixed(2)}`; pnlEl.className = `stat ${pnl >= 0 ? 'emerald' : 'magenta'}`; }
        if(wrEl) wrEl.innerText = `${wr}%`;
        calcLot();
        
        const todayTradesEl = document.getElementById('today-trades-count');
        if (todayTradesEl) {
            const today = new Date().toISOString().split('T')[0];
            const todayTrades = state.trades.filter(t => t.date && t.date.split('T')[0] === today);
            todayTradesEl.textContent = todayTrades.length;
        }
        
        const weekTradesEl = document.getElementById('week-trades-count');
        if (weekTradesEl) {
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const weekTrades = state.trades.filter(t => t.date && t.date >= weekAgo);
            weekTradesEl.textContent = weekTrades.length;
        }
    }

    function calcLot() {
        const r = parseFloat(document.getElementById('r-risk')?.value || 1) / 100;
        const sl = parseFloat(document.getElementById('r-sl')?.value || 1);
        const lot = (state.activeBalance * r) / (sl * 10);
        const res = document.getElementById('r-res');
        if(res) res.innerText = lot.toFixed(2);
        const tbl = document.getElementById('matrix-tbl');
        if(tbl) {
            const risk = state.activeBalance * 0.01;
            tbl.innerHTML = `
                <thead><tr><th>ASSET</th><th>10 PIPS</th><th>20 PIPS</th><th>50 PIPS</th></tr></thead>
                <tbody>
                    <tr><td class="cyan">GOLD</td><td>${(risk/100).toFixed(2)}</td><td>${(risk/200).toFixed(2)}</td><td>${(risk/500).toFixed(2)}</td></tr>
                    <tr><td class="cyan">FOREX</td><td>${(risk/100).toFixed(2)}</td><td>${(risk/200).toFixed(2)}</td><td>${(risk/500).toFixed(2)}</td></tr>
                    <tr><td class="cyan">US30</td><td>${(risk/100).toFixed(2)}</td><td>${(risk/200).toFixed(2)}</td><td>${(risk/500).toFixed(2)}</td></tr>
                </tbody>
            `;
        }
    }

    if(isAdmin) {
        document.getElementById('mode-badge').innerHTML = '<i class="fas fa-user-shield"></i> ADMIN MODE';
        document.getElementById('mode-badge').className = 'badge badge-e';
    }
    renderNav();
    renderAll();
    setTimeout(checkSmartNotifications, 1500);
</script>
</body>
</html>
